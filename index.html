<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yahoo Finance Data Export</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 text-white flex items-center justify-center px-4">
  <main class="w-full max-w-2xl">
    <div class="bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl p-8">

      <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-blue-400 mb-2">
          Yahoo Finance Data Export
        </h1>
        <p class="text-slate-400">
          הזיני סימולי מניות, טווח תאריכים ותדירות — והמערכת תפתח גיליון Google Sheets חדש
        </p>
      </div>

      <form id="financeForm" class="space-y-5">
        <div>
          <label class="block mb-2 text-sm font-medium text-slate-300">סימולי מניות</label>
          <input id="tickers" type="text" placeholder="לדוגמה: TSLA, AAPL, AMZN"
            class="w-full rounded-xl bg-slate-800 border border-slate-600 px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500"
            required />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-300">תאריך התחלה</label>
          <input id="startDate" type="date"
            class="w-full rounded-xl bg-slate-800 border border-slate-600 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            required />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-300">תאריך סיום</label>
          <input id="endDate" type="date"
            class="w-full rounded-xl bg-slate-800 border border-slate-600 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
            required />
        </div>

        <div>
          <label class="block mb-2 text-sm font-medium text-slate-300">תדירות נתונים</label>
          <select id="frequency"
            class="w-full rounded-xl bg-slate-800 border border-slate-600 px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="1d">Daily</option>
            <option value="1wk">Weekly</option>
            <option value="1mo">Monthly</option>
          </select>
        </div>

        <button id="submitBtn" type="submit"
          class="w-full rounded-xl bg-blue-600 hover:bg-blue-500 transition font-bold py-4 text-lg shadow-lg shadow-blue-900/30">
          יצירת גיליון נתונים
        </button>
      </form>

      <div id="messageBox" class="mt-6 hidden rounded-xl p-4 text-sm"></div>
    </div>
  </main>

  <script>
    // הקישור החדש שלך ל-Google Apps Script Web App
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzy-svYTraIlN-90tLM6QSv37QzzExnWv-EoPc7OZ9VUiwxMYe8Bhhwg7uvSmY_9OWS/exec";

    const form = document.getElementById("financeForm");
    const submitBtn = document.getElementById("submitBtn");
    const messageBox = document.getElementById("messageBox");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      messageBox.classList.add("hidden");

      const tickersInput = document.getElementById("tickers").value;
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;
      const frequency = document.getElementById("frequency").value;

      const tickers = tickersInput
        .split(",")
        .map(ticker => ticker.trim().toUpperCase())
        .filter(ticker => ticker.length > 0);

      if (tickers.length === 0) {
        showMessage("נא להזין לפחות סימול מניה אחד.", "error");
        return;
      }

      const payload = {
        tickers: tickers,
        startDate: startDate,
        endDate: endDate,
        frequency: frequency
      };

      submitBtn.disabled = true;
      submitBtn.textContent = "טוען נתונים...";

      showMessage("הבקשה נשלחה. הגיליון ייפתח בטאב חדש אחרי שהנתונים ייווצרו.", "success");

      // שולחים כ-form רגיל כדי לעקוף CORS
      const hiddenForm = document.createElement("form");
      hiddenForm.method = "POST";
      hiddenForm.action = WEB_APP_URL;
      hiddenForm.target = "_blank";
      hiddenForm.style.display = "none";

      const input = document.createElement("input");
      input.type = "hidden";
      input.name = "payload";
      input.value = JSON.stringify(payload);

      hiddenForm.appendChild(input);
      document.body.appendChild(hiddenForm);
      hiddenForm.submit();
      document.body.removeChild(hiddenForm);

      setTimeout(function () {
        submitBtn.disabled = false;
        submitBtn.textContent = "יצירת גיליון נתונים";
      }, 2000);
    });

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.classList.remove("hidden");

      if (type === "success") {
        messageBox.className =
          "mt-6 rounded-xl p-4 text-sm bg-emerald-900/40 border border-emerald-600 text-emerald-300";
      } else {
        messageBox.className =
          "mt-6 rounded-xl p-4 text-sm bg-red-900/40 border border-red-600 text-red-300";
      }
    }
  </script>
</body>
</html>
