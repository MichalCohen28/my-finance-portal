<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Data Fetcher | Pro Terminal</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { 950: '#020617', 900: '#0f172a', 800: '#1e293b', 700: '#334155' },
            cyan: { 400: '#22d3ee', 500: '#06b6d4' },
            emerald: { 400: '#34d399', 500: '#10b981' }
          },
          animation: {
            'glow': 'glow 3s infinite alternate',
            'float': 'float 6s infinite ease-in-out',
          },
          keyframes: {
            glow: {
              '0%': { 'box-shadow': '0 0 5px rgba(34, 211, 238, 0.2)' },
              '100%': { 'box-shadow': '0 0 20px rgba(34, 211, 238, 0.6)' }
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' }
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #020617;
      font-family: 'Heebo', sans-serif;
      overflow-x: hidden;
    }

    /* רקע חלקיקים */
    #particles-js {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* אפקט זכוכית (Glassmorphism) משופר */
    .glass {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    .input-field {
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(71, 85, 105, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-field:focus {
      background: rgba(30, 41, 59, 0.8);
      border-color: #22d3ee;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
    }

    /* סמן גרירה מעוצב */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }

    /* אנימציית טעינה מתקדמת */
    .shimmer {
      position: relative;
      overflow: hidden;
    }
    .shimmer::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(34, 211, 238, 0.1), transparent);
      transform: translateX(-100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }

    .ticker-tag {
      animation: popIn 0.3s cubic-bezier(0.26, 1.36, 0.74, 1.11) both;
    }
    @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>

<body class="text-slate-300">

  <canvas id="particles-js"></canvas>

  <div class="relative z-20 w-full bg-slate-950/80 backdrop-blur-md border-b border-white/5 py-2">
    <div class="flex overflow-hidden whitespace-nowrap group">
      <div class="flex animate-[ticker-scroll_40s_linear_infinite] gap-12 px-4 hover:[animation-play-state:paused]">
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">BTC/USD</b> <span class="text-emerald-400">+$2,410.50</span></span>
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">NVDA</b> <span class="text-emerald-400">+4.21%</span></span>
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">AAPL</b> <span class="text-red-400">-0.12%</span></span>
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">TSLA</b> <span class="text-emerald-400">+1.55%</span></span>
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">GOOGL</b> <span class="text-emerald-400">+0.88%</span></span>
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">BTC/USD</b> <span class="text-emerald-400">+$2,410.50</span></span>
        <span class="flex items-center gap-2 font-mono text-xs"><b class="text-white">NVDA</b> <span class="text-emerald-400">+4.21%</span></span>
      </div>
    </div>
  </div>

  <main class="relative z-10 flex flex-col items-center justify-center px-4 py-16">
    
    <div class="text-center mb-12 animate-float">
      <div class="inline-block p-3 rounded-2xl bg-cyan-500/10 border border-cyan-500/20 mb-6">
        <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
        </svg>
      </div>
      <h1 class="text-5xl font-extrabold text-white tracking-tighter mb-4">
        Terminal <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-emerald-400">Data</span>
      </h1>
      <p class="text-slate-400 font-light tracking-wide">Professional Grade Stock Intelligence</p>
    </div>

    <div class="glass w-full max-w-xl rounded-3xl p-10 relative overflow-hidden group">
      <div class="absolute -top-24 -left-24 w-48 h-48 bg-cyan-500/10 blur-[100px] pointer-events-none"></div>

      <div class="space-y-8">
        <div class="relative">
          <label class="text-[10px] uppercase tracking-[0.2em] text-cyan-400 font-bold mb-3 block">Asset Symbols</label>
          <input id="tickers" type="text" class="input-field w-full p-4 rounded-xl text-white placeholder:text-slate-600 outline-none" placeholder="AAPL, NVDA, BTC-USD...">
          <div id="tickerTags" class="flex flex-wrap gap-2 mt-4"></div>
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-3 block">Start Period</label>
            <input id="startDate" type="date" class="input-field w-full p-3 rounded-xl text-white outline-none">
          </div>
          <div>
            <label class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-3 block">End Period</label>
            <input id="endDate" type="date" class="input-field w-full p-3 rounded-xl text-white outline-none">
          </div>
        </div>

        <div>
          <label class="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold mb-3 block">Data Resolution</label>
          <div class="grid grid-cols-3 gap-3">
            <button onclick="setFreq('1d', this)" class="freq-btn p-3 rounded-xl border border-white/5 bg-white/5 hover:bg-cyan-500/20 transition-all active-freq">Daily</button>
            <button onclick="setFreq('1wk', this)" class="freq-btn p-3 rounded-xl border border-white/5 bg-white/5 hover:bg-cyan-500/20 transition-all">Weekly</button>
            <button onclick="setFreq('1mo', this)" class="freq-btn p-3 rounded-xl border border-white/5 bg-white/5 hover:bg-cyan-500/20 transition-all">Monthly</button>
          </div>
          <input type="hidden" id="frequency" value="1d">
        </div>

        <button id="submitBtn" onclick="fetchStockData()" class="w-full bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-400 hover:to-cyan-500 text-navy-950 font-black py-5 rounded-2xl transition-all shadow-[0_0_20px_rgba(34,211,238,0.3)] active:scale-[0.98]">
          <span id="btnText" class="flex items-center justify-center gap-2">
            EXECUTE DATA FETCH
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3" stroke-width="2.5"></path></svg>
          </span>
        </button>
      </div>
    </div>

    <div id="resultCard" class="hidden w-full max-w-xl mt-8 animate-popIn">
      <div class="glass rounded-3xl p-8 border-emerald-500/30 bg-emerald-500/5">
        <div class="flex items-center justify-between">
          <div>
            <h3 class="text-white font-bold text-xl mb-1">Process Synchronized</h3>
            <p id="resultMeta" class="text-emerald-400/80 text-xs font-mono"></p>
          </div>
          <div class="bg-emerald-500/20 p-3 rounded-full">
            <svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
        </div>
        <a id="sheetLink" href="#" target="_blank" class="mt-8 flex items-center justify-center gap-3 w-full bg-white text-navy-950 font-bold py-4 rounded-xl hover:bg-slate-200 transition-colors">
          OPEN SPREADSHEET
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke-width="2.5"></path></svg>
        </a>
      </div>
    </div>

  </main>

  <script>
    // --- הגדרות WEB APP ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzU77UQes0vMYcmYcUGKtP-eCVdpWOkGcfYM-JYkziKg3IJE9EHbWeBPFrFxlLEeO-W/exec";

    // --- רקע חלקיקים בסיסי ב-Canvas ---
    const canvas = document.getElementById('particles-js');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function initParticles() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 2,
          speedX: (Math.random() - 0.5) * 0.5,
          speedY: (Math.random() - 0.5) * 0.5
        });
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(34, 211, 238, 0.3)';
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;
        if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
        if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      requestAnimationFrame(animateParticles);
    }
    initParticles();
    animateParticles();

    // --- לוגיקת טופס ---
    function setFreq(val, btn) {
      document.getElementById('frequency').value = val;
      document.querySelectorAll('.freq-btn').forEach(b => b.classList.remove('bg-cyan-500/30', 'border-cyan-400'));
      btn.classList.add('bg-cyan-500/30', 'border-cyan-400');
    }

    document.getElementById("tickers").addEventListener("input", function() {
      const container = document.getElementById("tickerTags");
      container.innerHTML = "";
      this.value.split(",").map(t => t.trim().toUpperCase()).filter(t => t).forEach(tag => {
        const span = document.createElement("span");
        span.className = "ticker-tag px-3 py-1 bg-cyan-500/10 border border-cyan-500/30 rounded-lg text-cyan-400 text-[10px] font-mono font-bold tracking-wider";
        span.textContent = tag;
        container.appendChild(span);
      });
    });

    async function fetchStockData() {
      const btn = document.getElementById("submitBtn");
      const btnText = document.getElementById("btnText");
      
      // מצב טעינה
      btn.disabled = true;
      btn.classList.add('shimmer', 'opacity-80');
      btnText.innerHTML = "SYNCHRONIZING WITH YAHOO...";

      const payload = {
        tickers: document.getElementById("tickers").value.split(",").map(t => t.trim()),
        startDate: document.getElementById("startDate").value,
        endDate: document.getElementById("endDate").value,
        frequency: document.getElementById("frequency").value
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();

        if (data.success) {
          // חגיגת קונפטי!
          confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#22d3ee', '#10b981', '#ffffff']
          });

          document.getElementById("resultMeta").textContent = `DATASET: ${data.rowCount} ROWS | ASSETS: ${data.tickers.join(", ")}`;
          document.getElementById("sheetLink").href = data.sheetUrl;
          document.getElementById("resultCard").classList.remove("hidden");
        }
      } catch (e) {
        alert("System Error: Connection to backend failed.");
      } finally {
        btn.disabled = false;
        btn.classList.remove('shimmer', 'opacity-80');
        btnText.innerHTML = `EXECUTE DATA FETCH`;
      }
    }

    // אתחול תאריכים
    const end = new Date();
    const start = new Date();
    start.setFullYear(end.getFullYear() - 1);
    document.getElementById("startDate").value = start.toISOString().split('T')[0];
    document.getElementById("endDate").value = end.toISOString().split('T')[0];
  </script>
</body>
</html>
